[project]
name = "sci-hub-mcp-server"
version = "0.2.0"
description = "MCP server for searching and downloading academic papers via Sci-Hub"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "fastmcp>=0.1.0",
]

[project.scripts]
sci-hub-mcp-server = "sci_hub_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
    "sci_hub_server.py",
    "sci_hub_search.py",
]
