[project]
name = "scihub-mcp"
version = "0.3.0"
description = "MCP server for searching and downloading academic papers via Sci-Hub, with CrossRef metadata enrichment"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.0",
    "fastmcp>=3.0.0",
]

[project.scripts]
scihub-mcp = "scihub_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scihub_mcp"]
